# Build the macOS portable tarball on GitHub-hosted macOS (Apple Silicon).
# Use when you do not have a Mac locally: push this repo to GitHub, run this workflow, download the artifact.
name: Build portable macOS bundle

on:
  workflow_dispatch:
    inputs:
      run_prepare_offline:
        description: "Run prepare-offline-macos.sh first (downloads wheels; much slower, ~60–120+ min)"
        type: boolean
        default: false

jobs:
  portable-macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare offline wheels (optional)
        if: ${{ inputs.run_prepare_offline == true }}
        run: chmod +x prepare-offline-macos.sh && ./prepare-offline-macos.sh

      - name: Build portable bundle
        run: chmod +x build-portable-macos.sh && ./build-portable-macos.sh

      - name: List dist
        run: ls -la dist/

      # Same runner as build: proves the shipped tarball extracts and key imports work (no local Mac needed).
      - name: Smoke test tarball (extract + Python imports)
        run: |
          set -euo pipefail
          TGZ="dist/JupyterExam-Portable-mac-arm64.tar.gz"
          test -f "$TGZ"
          EXTRACT="/tmp/jp-smoke-$$"
          rm -rf "$EXTRACT"
          mkdir -p "$EXTRACT"
          tar -xzf "$TGZ" -C "$EXTRACT"
          ROOT="$EXTRACT/JupyterExam-Portable-mac-arm64"
          test -d "$ROOT"
          PY="$ROOT/runtime/python/bin/python3.12"
          test -x "$PY"
          "$PY" -E -s -c "import platform; v=platform.python_version(); assert v=='3.12.8', v"
          "$PY" -E -s -c "import jupyter, notebook, numpy, pandas, matplotlib, sklearn, seaborn, PIL, cv2, xgboost, onnx, onnxruntime, openpyxl, xlrd, joblib, scipy, imblearn"
          test -f "$ROOT/START-Jupyter.command"
          test -x "$ROOT/START-Jupyter.command"
          echo "Smoke test OK: extracted bundle imports and launchers present."

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: JupyterExam-Portable-mac-arm64
          path: dist/JupyterExam-Portable-mac-arm64.tar.gz
          if-no-files-found: error
